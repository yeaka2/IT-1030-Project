<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="expense-page">
    <section class="expense-intro">
        <h1>💸 Expense Calculator</h1>
        <p>Calculate your annual expenses based on monthly spending and time period.</p>
    </section>

    <main class="main-wrapper">
        <div class="left-panel">
            <div class="input-group">
                <div class="enter">
                    <label>Household ($/mo):</label>
                    <input type="text" class="expense household" id="householdInput"/>
                </div>
                <div class="enter">
                    <label>Transport ($/mo):</label>
                    <input type="text" class="expense transport" id="transportInput"/>
                </div>
                <div class="enter">
                    <label>Food & Beverage ($/mo):</label>
                    <input type="text" class="expense food" id="foodInput"/>
                </div>
                <div class="enter">
                    <label>Financial ($/mo):</label>
                    <input type="text" class="expense financial" id="financialInput"/>
                </div>
                <div class="enter">
                    <label>Family ($/mo):</label>
                    <input type="text" class="expense family" id="familyInput"/>
                </div>
                <div class="enter">
                    <label>Shopping ($/mo):</label>
                    <input type="text" class="expense shopping" id="shoppingInput"/>
                </div>
                <div class="enter">
                    <label>Lifestyle ($/mo):</label>
                    <input type="text" class="expense lifestyle" id="lifestyleInput"/>
                </div>
                <div class="enter">
                    <label>Personal Care ($/mo):</label>
                    <input type="text" class="expense personal" id="personalInput"/>
                </div>
                <div class="enter">
                    <label>Others ($/mo):</label>
                    <input type="text" class="expense others" id="othersInput"/>
                </div>
                <div class="enter">
                    <label for="yearsInput">Time (years):</label>
                    <input type="text" class="years" id="yearsInput"/>
                </div>
                <div class="enter">
                    <label>Total Cost($/Year):</label>
                    <input type="number" class="output" readonly/>
                </div>
                <div class="buttons">
                    <button class="btn1 calc-expense">Calculate</button>
                    <button class="btn2" onclick="window.location.href='nav.html'">Back</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Chart Results Section -->
    <div class="results-section expense-results" id="resultsSection" style="display:none;">
        <h2>Expense Analysis</h2>
        <div class="charts-grid expense-charts-grid">
            <div class="chart-container expense-chart-card">
                <h3>Spending Distribution</h3>
                <div class="chart-wrapper">
                    <canvas id="expensePieChart"></canvas>
                </div>
            </div>
            <div class="chart-container expense-chart-card">
                <h3>Category Breakdown</h3>
                <div class="chart-wrapper">
                    <canvas id="expenseBarChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="expense.js"></script>
</body>
</html>

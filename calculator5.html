<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Expense Calculator</h2>
    <main class="main-wrapper">
        <div class="left-panel">
            <div class="input-group">
                <div class="enter">
                    <label>Household ($/month):</label>
                    <input type="text" class="expense household" id="householdInput"/>
                </div>
                <div class="enter">
                    <label>Transport ($/month):</label>
                    <input type="text" class="expense transport" id="transportInput"/>
                </div>
                <div class="enter">
                    <label>Food &amp; Beverage ($/month):</label>
                    <input type="text" class="expense food" id="foodInput"/>
                </div>
                <div class="enter">
                    <label>Financial ($/month):</label>
                    <input type="text" class="expense financial" id="financialInput"/>
                </div>
                <div class="enter">
                    <label>Family ($/month):</label>
                    <input type="text" class="expense family" id="familyInput"/>
                </div>
                <div class="enter">
                    <label>Shopping ($/month):</label>
                    <input type="text" class="expense shopping" id="shoppingInput"/>
                </div>
                <div class="enter">
                    <label>Lifestyle ($/month):</label>
                    <input type="text" class="expense lifestyle" id="lifestyleInput"/>
                </div>
                <div class="enter">
                    <label>Personal Care ($/month):</label>
                    <input type="text" class="expense personal" id="personalInput"/>
                </div>
                <div class="enter">
                    <label>Others ($/month):</label>
                    <input type="text" class="expense others" id="othersInput"/>
                </div>
                <div class="enter">
                    <label for="yearsInput">Time (years):</label>
                    <input type="text" class="years" id="yearsInput"/>
                </div>
                <div class="enter">
                    <label>Total Cost($/Year):</label>
                    <input type="number" class="output" readonly/>
                </div>
                <div class="buttons">
                    <button class="btn1 calc-expense">Calculate</button>
                    <button class="btn2" onclick="window.location.href='nav.html'">Back</button>
                </div>
            </div>
        </div>
    </main>
    <script src="expense.js"></script>
</body>
</html>

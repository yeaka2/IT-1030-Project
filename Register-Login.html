<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Login & Register</title>
    <style>
        /* Global Style Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(to bottom, rgb(173, 196, 255), #ffffff);
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            animation: focus 0.5s forwards;
        }

        @keyframes focus {
            0% {filter:blur(8px);}
            100% {filter:blur(0)}
        }
        /* Main Container */
        .bank-container {
            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.7); /* semi-transparent panel */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 550px;
        }
        /* Title */
        .bank-container h1 {
            color: rgb(30, 36, 61);
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 600;
        }
        /* Form Group */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 500;
        }
        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            background-color: #f9f9f9;
            transition: all 0.3s ease;
        }
        .form-group input[type="text"]:focus,
        .form-group input[type="password"]:focus {
            outline: none;
            border-color: rgb(173, 196, 255);
            background-color: #d9d9f0;
            box-shadow: 0 0 12px rgba(173, 196, 255, 0.5);
        }
        /* Button Styles */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn-primary {
            background-color: rgb(173, 196, 255);
            color: rgb(30, 36, 61);
        }
        .btn-primary:hover {
            background-color: rgb(150, 175, 255);
            transform: scale(1.02);
        }
        .btn-secondary {
            background-color: rgb(200, 210, 255);
            color: rgb(30, 36, 61);
        }
        .btn-secondary:hover {
            background-color: rgb(180, 195, 255);
            transform: scale(1.02);
        }
    
        /* Textarea */
        .log-area {
            width: 100%;
            padding: 16px;
            border: 1px solid rgb(173, 196, 255);
            border-radius: 8px;
            background-color: #f9f9f9;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 20px;
        }
        /* Result Area */
        .result-area {
            margin-top: 20px;
            padding: 16px;
            background-color: rgba(173, 196, 255, 0.15);
            border-radius: 8px;
            border-left: 4px solid rgb(173, 196, 255);
        }
        .result-area label {
            color: rgb(30, 36, 61);
            font-weight: 500;
            margin-right: 10px;
        }
        .result-area input {
            border: none;
            background: transparent;
            font-size: 18px;
            font-weight: 600;
            color: rgb(30, 36, 61);
            width: 400px;
        }
        .video-background{
            position:fixed;
            top:0;
            left:0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index:-2;
        }
        .video-background video{
            width:100%;
            height:100%;
            object-fit: cover;
            filter: blur(8px);
            transform: scale(1.1);
        }
        .white-overlay{
            position:fixed;
            top:0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.3);
            z-index: -1;
        }
    </style>
</head>
<body>
    <script>
        let users = [];  // Temporary in-memory user storage
        function register() {
            let username = document.bankForm.username.value;
            let password = document.bankForm.password.value;
            // Validate Input
            if (!username || !password) {
                document.bankForm.result.value = "Please fill in your account and password!";
                return false;
            }
            // Check if user already exists
            let userExists = false;
            for (let i = 0; i < users.length; i++) {
                let currentUser = users[i];
                if (currentUser.username === username) {
                    userExists = true;
                    break;
                }
            }
            if (userExists) {
                document.bankForm.result.value = "Username already registered!";
                return;
            }
            users.push({ username, password }); // Store new user and update logs
            let logContent = document.bankForm.logArea.value;
            let newLog = `User: ${username} registered successfully\n` +
                         `_ _ _ _ _ _ _\n`;
            document.bankForm.logArea.value = logContent + newLog;
            document.bankForm.result.value = "Register successfully!";
            document.bankForm.username.value = ""; // Clear inputs
            document.bankForm.password.value = "";
        }
        function login() {
            let username = document.bankForm.username.value;
            let password = document.bankForm.password.value;
           
            if (!username || !password) {
                document.bankForm.result.value = "Please fill in your account and password!";
                return;
            }
             // Find user in array
            let foundUser = undefined;
            for (let i = 0; i < users.length; i++) {
                let currentUser = users[i];
                if (currentUser.username === username && currentUser.password === password) {
                    foundUser = currentUser;
                    break;
                }
            }
            if (foundUser) {
                let logContent = document.bankForm.logArea.value;
                let newLog = `User: ${username} logged in successfully\n` +
                             `_ _ _ _ _ _ _\n`;
                document.bankForm.logArea.value = logContent + newLog;
                document.bankForm.result.value = "Login successfully!";
                // Redirect after success
                setTimeout(function() {
                    window.location.href = "nav.html";
                }, 1);
            } else {
                document.bankForm.result.value = "Invalid username or password!";
            }
            document.bankForm.username.value = "";
            document.bankForm.password.value = "";
        }
    </script>
    <div class="bank-container">
        <h1>Bank Login & Register</h1>
        <form name="bankForm">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" name="username" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" name="password" id="password" required>
            </div>

            <input type="button" class="btn btn-primary" value="Register" onclick="register()">
            <input type="button" class="btn btn-secondary" value="Login" onclick="login()">

            <br>
            <textarea name="logArea" class="log-area" rows="5" cols="30" readonly></textarea>

            <div class="result-area">
                <label for="result">Status:</label>
                <input type="text" name="result" id="result" readonly>
            </div>
        </form>
    </div>
    <!-- Background Video -->
            <div class="video-background">
                <video autoplay muted loop playsinline>
                    <source src="login.mp4" type="video/mp4">
                </video>
            </div>
            <div class="white-overlay"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Compound Interest Calculator (Manual interest rate)</h2>
    <main class="main-wrapper">
        <!-- Left Section: Input Form -->
        <div class="left-panel">
            <div class="input-group">
                <div class=" enter enter1">
                    <label for="oneInput">Principal($):</label>
                    <input type="text" class="input1" id="oneInput"/>
                </div>

                <div class="enter enter2">
                    <label for="twoInput">Time (years):</label>
                    <input type="text" class="input2" id="twoInput"/>
                </div>

                <div class="enter enter3">
                    <label for="threeInput">Rate(Percent):</label>
                    <input type="text" class="input3" id="threeInput"/>
                </div>

                <div class="enter enter4">
                    <label>Total:</label>
                    <input type="number" class="output"/>
                </div>

                <div class="buttons">
                    <button class="btn1">Calculate</button>
                    <button class="btn2" onclick="window.location.href='nav.html'">Back</button>
                    <button class="btn3" onclick="window.location.href='interest-rate-calculator.html'">Real-time Rate Mode</button>
                </div>
            </div>
        </div>

        <!-- Right Section: Charts -->
        <div class="right-panel">
  
            <div class="chart-row1">
                <!--Chart Area--> 
                <div class="chart-container container1">
                    <h3>Compound interest growth chart</h3>
                    <canvas id="compoundChart"></canvas>
                </div>
            
                <!--Additional reports-->
                <div class="chart-container container2">
                    <h3>Simple vs Compound</h3>
                    <canvas id="comparisonChart"></canvas>
                </div>
            </div>

        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="compound-interest-calculator.js"></script>
</body>
</html>

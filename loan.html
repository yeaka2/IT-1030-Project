<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Calculator</title>

  <!-- Reuse your existing calculator look -->
  <link rel="stylesheet" href="loan.css" />
</head>

<body class="loan-page">
  <h2 class="loantitle">Loan Calculator</h2>
  <main>
    <div class="main-wrapper">
      <!-- LEFT: inputs + outputs -->
      <section class="left-panel">
        <div class="input-group">
          <label class="enter" for="loanAmount">Loan Amount ($):</label>
          <input class="input1 enter" id="loanAmount" type="number" min="0" step="0.01" value="200000" />
        </div>

        <div class="input-group">
          <label class="enter" for="loanYears">Term (years):</label>
          <input class="input2 enter" id="loanYears" type="number" min="0" step="1" value="30" />
        </div>

        <div class="input-group">
          <label class="enter" for="loanRate">Annual Rate (%):</label>
          <input class="input3 enter" id="loanRate" type="number" min="0" step="0.01" value="5" />
        </div>

        <div class="buttons">
          <button class="btn1" type="button">Calculate</button>
          <button class="btn2" type="button">Back</button>
        </div>

        <div class="input-group">
          <label class="enter" for="monthlyPay">Monthly Payment ($):</label>
          <input class="output output-monthly enter" id="monthlyPay" type="text" readonly />
        </div>

        <div class="input-group">
          <label class="enter" for="totalInterest">Total Interest ($):</label>
          <input class="output output-interest enter" id="totalInterest" type="text" readonly />
        </div>

        <div class="input-group">
          <label class="enter" for="totalPay">Total Payment ($):</label>
          <input class="output output-total enter" id="totalPay" type="text" readonly />
        </div>
      </section>

      <!-- RIGHT: charts -->
      <section class="right-panel">
        <div class="loan-chart-grid">
          <div class="chart-container loan-chart-card loan-chart-wide graph1">
            <h3>Remaining Balance (by year)</h3>
            <div class="loan-canvas-wrap loan-canvas-line">
              <canvas id="balanceChart"></canvas>
            </div>
          </div>

          <div class="chart-container loan-chart-card loan-chart-pie graph2">
            <h3>Principal vs Interest</h3>
            <div class="loan-canvas-wrap loan-canvas-pie">
              <canvas id="pieChart"></canvas>
            </div>
          </div>

          <div class="chart-container loan-chart-card loan-chart-wide graph3">
            <h3>Cumulative Paid (by year)</h3>
            <div class="loan-canvas-wrap loan-canvas-line loan-canvas-line-bottom">
              <canvas id="cumulativeChart"></canvas>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="table-wrapper">
      <h3>Amortization Schedule (monthly)</h3>
      <table class="data-table">
        <thead>
          <tr>
            <th>Month</th>
            <th>Payment</th>
            <th>Principal</th>
            <th>Interest</th>
            <th>Balance</th>
          </tr>
        </thead>
        <tbody id="amortBody"></tbody>
      </table>
    </div>
  </main>
  <div id="billModal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2>--- Loan Bill ---</h2>
      <div id="billContent" class="bill-content"></div>
    </div>
  </div>

  <div class="overlay"></div>

  <!-- Chart.js (same library your other calculator code expects) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="loan.js"></script>
</body>
</html>

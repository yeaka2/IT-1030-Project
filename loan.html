<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Calculator</title>
    <link rel="stylesheet" href="loan.css">
</head>
<body>

    <nav>
        <div class="all-top-button">
            <button class="nav-button1">Compound Interest</button>
            <button class="nav-button2">Exchange Rate</button>
            <button class="nav-button3">Loan Calculator</button>
            <button class="nav-button4">calculator4</button>
            <button class="nav-button5">Personal Page</button>
        </div>
    </nav>

    <main>
        <h1>Loan Repayment Calculator</h1>

        <div class="calculator-container">
            <label>Loan Amount:</label>
            <input type="number" id="loanAmount" placeholder="Enter loan amount">

            <label>Annual Interest Rate (%):</label>
            <input type="number" id="interestRate" placeholder="Enter annual interest rate">

            <label>Loan Period (Years):</label>
            <input type="number" id="loanYears" placeholder="Enter number of years">

            <button id="calculateLoan">Calculate</button>

            <div class="result">
                <p>Monthly Payment: <span id="monthlyPayment">-</span></p>
                <p>Total Payment: <span id="totalPayment">-</span></p>
                <p>Total Interest: <span id="totalInterest">-</span></p>
            </div>
        </div>
    </main>

    <script src="navactions.js"></script>
    <script src="loan.js"></script>

</body>
</html>

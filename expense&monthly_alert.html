<!DOCTYPE html>
<html>
    <body>

        <script>
            function expensebill(expense){
                let message="---The bill of expense---\n";
                for (let i in expense){
                    message=message+i+":"+expense[i]+"\n";
                }
                alert(message)
            }
            function monthlybill(month,month_bill){
                const month_name=["January","February","March","April","May","June","July","August","September","October","November","December"];
                let name=month_name[month];
                let message="---The bill of "+name+"---\n";
                for (let i in month_bill){
                    message=message+i+":"+month_bill[i]+"\n";
                }
                alert(message)

            }

        </script>

    </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Compound Interest Calculator</h2>
    <main class="main-wrapper">
        <!-- Left Section: Input Form -->
        <div class="left-panel">
            <div class="input-group">
                <div>
                    <label for="oneInput">Principal($):</label>
                    <input type="text" class="input1" id="oneInput"/>
                </div>

                <div>
                    <label for="twoInput">Time (years):</label>
                    <input type="text" class="input2" id="twoInput"/>
                </div>

                <div>
                    <label for="threeInput">Rate(Percent):</label>
                    <input type="text" class="input3" id="threeInput"/>
                </div>

                <div>
                    <label>Total:</label>
                    <input type="number" class="output"/>
                </div>

                <button class="btn1">Calculate</button>
                <button class="btn2" onclick="window.location.href='nav.html'">Back</button>
            </div>
        </div>

        <!-- Right Section: Charts -->
        <div class="right-panel">
            <!--Chart Area--> 
            <div class="chart-container">
                <h3>Compound interest growth chart</h3>
                <canvas id="compoundChart"></canvas>
            </div>
            
            <!--Additional reports-->
            <div class="chart-container">
                <h3>Principal vs Interest</h3>
                <canvas id="pieChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Simple vs Compound</h3>
                <canvas id="comparisonChart"></canvas>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="manipulations.js"></script>
</body>
</html>

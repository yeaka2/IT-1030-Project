<!DOCTYPE html>
<html>
    <body>
        <script>
            function loanBill(loanData){
                let message="---Loan Bill---\n";
                Object.entries(loanData).forEach(function(entry){
                    message += entry[0] + ":" + entry[1] + "\n";
                });
                alert(message);
            }
        </script>
    </body>
</html>
